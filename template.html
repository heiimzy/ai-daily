<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - AI Daily</title>
  <meta name="description" content="{{SUMMARY}}">
  <meta name="keywords" content="{{KEYWORDS}}">
  <link rel="alternate" hreflang="zh" href="https://ai-daily.cc.cd/posts/{{ZH_FILE}}">
  <link rel="alternate" hreflang="en" href="https://ai-daily.cc.cd/posts/{{EN_FILE}}">
  <link rel="canonical" href="https://ai-daily.cc.cd/posts/{{FILE}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" type="image/svg+xml" href="../icon.svg">
  <link rel="stylesheet" href="../style.css">
  <style>
    .post-article { max-width: 800px; margin: 0 auto; padding: 2rem 1rem 4rem; position: relative; }
    .post-article .post-date { color: #666; font-size: 0.8rem; font-family: -apple-system, sans-serif; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; border-bottom: 1px solid #d4cfc7; padding-bottom: 0.75rem; }
    .post-article .post-tags { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .post-article .post-tags .tag { color: #666; font-size: 0.75rem; }
    .post-article .post-tags .tag::before { content: '#'; }
    .post-article h1 { font-family: Georgia, 'Times New Roman', Times, serif; font-size: 2rem; margin-bottom: 0.75rem; line-height: 1.3; font-weight: 900; color: #111; background: none; -webkit-text-fill-color: #111; }
    .post-article h2 { font-size: 1.3rem; margin: 1.5rem 0 0.75rem; padding-bottom: 0.3rem; border-bottom: 1px solid #d4cfc7; color: #111; }
    .post-article h3 { font-size: 1.1rem; margin: 1.2rem 0 0.5rem; color: #1a3a5c; }
    .post-article p { line-height: 1.8; margin: 0.75rem 0; color: #1a1a1a; font-size: 1.05rem; }
    .post-article ul, .post-article ol { padding-left: 1.5rem; margin: 0.75rem 0; line-height: 1.8; color: #1a1a1a; }
    .post-article li { margin: 0.3rem 0; }
    .post-article blockquote { border-left: 4px solid #8b1a1a; padding: 0.5rem 1rem; margin: 1rem 0; background: #f8f6f0; color: #666; font-style: italic; }
    .post-article a { color: #1a3a5c; font-weight: 700; }
    .post-article a:hover { color: #8b1a1a; }
    .post-nav { max-width: 800px; margin: 0 auto 2rem; padding: 0.75rem 1rem; border-bottom: 1px solid #d4cfc7; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-family: -apple-system, sans-serif; }
    .post-nav a { color: #1a3a5c; text-decoration: none; }
    .post-nav a:hover { color: #8b1a1a; text-decoration: underline; }
    .post-header { max-width: 800px; margin: 0 auto; padding: 2rem 1rem 0; text-align: center; border-bottom: 3px double #333; margin-bottom: 1.5rem; }
    .post-header .site-title { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; color: #111; text-decoration: none; font-family: Georgia, 'Times New Roman', Times, serif; }
    .post-header .site-title:hover { color: #8b1a1a; }
  </style>
</head>
<body>

<div class="post-header">
  <a href="../index.html" class="site-title">AI 日报</a>
  <div style="font-size:0.75rem;color:#666;margin-top:0.25rem;font-style:italic;font-family:Georgia,serif;">{{DATE}}</div>
</div>

<div class="post-nav">
  <a href="../index.html">← 返回首页</a>
  <a href="{{OTHER_LANG_FILE}}">{{OTHER_LANG_LABEL}}</a>
</div>

<article class="post-article">
  <div class="post-date">{{DATE}}</div>
  <div class="post-tags">{{TAGS_HTML}}</div>
  <h1>{{TITLE}}</h1>
  {{CONTENT}}
  <div style="margin-top:2rem;padding-top:1rem;border-top:2px solid #333;">
    <p style="font-size:0.9rem;color:#666;">
      {{FOOTER_TEXT}} <a href="https://ai-daily.cc.cd/{{FOOTER_TOOLS}}" target="_blank">{{FOOTER_TOOLS_LABEL}}</a> 获取 99+ 款免费在线工具。
    </p>
  </div>
</article>

<footer>
  <div class="container">
    <p>AI 日报 &copy; 2026 · <a href="../index.html">Free AI Tools</a></p>
  </div>
</footer>

</body>
</html>
